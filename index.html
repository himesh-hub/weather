<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="src/output.css">
</head>

<body>

    <div class="hi bg-cover bg-center bg-no-repeat min-h-screen w-full">
        <header class="h-14 w-full flex justify-between items-center">
            <p class="font-bold">DAILYweather</p>
            <ul class="flex w-3/12 justify-around">
                <li>Home</li>
                <li>Contact us</li>
                <li>About</li>
            </ul>
        </header>
        <div class="h-222 w-screen flex">
            <div class="left w-[50%] h-full">
                <div class="h-50 w-80 relative left-[15%] top-[10%]">
                    <div class="weather text-amber-50 font-bold text-5xl">Cloudy</div>
                    <div class="dayNight text-amber-50 font-bold">Day</div>
                    <div class="time text-amber-50 font-bold text-2x1">Sunday,06 12:00</div>
                </div>
                <div class="h-50 w-80 flex relative left-[15%] top-[50%]">
                    <div class="temp text-amber-50 text-9xl font-bold self-center">36</div>
                    <div class="unit text-amber-50 relative top-30 text-3xl">c</div>
                </div>
            </div>
            <div class="right flex flex-col w-[50%] h-full justify-around">
                <div class="h-15 w-40 relative left-[25%]">
                    <p class=" text-3xl text-white font-sans">Monday</p>
                    <div class="daily-hour flex">30
                        <div class="unit">*c</div>
                    </div>
                </div>
                <div class="h-15 w-40 relative left-[25%]">
                    <p class=" text-3xl text-white font-sans">Tuesday</p>
                    <div class="daily-hour flex">30
                        <div class="unit">*c</div>
                    </div>
                </div>
                <div class="h-15 w-40 relative left-[25%]">
                    <p class=" text-3xl text-white font-sans">Wednesday</p>
                    <div class="daily-hour flex">30
                        <div class="unit">*c</div>
                    </div>
                </div>
                <div class="h-15 w-40 relative left-[25%]">
                    <p class=" text-3xl text-white font-sans">Thursday</p>
                    <div class="daily-hour flex">30
                        <div class="unit">*c</div>
                    </div>
                </div>
                <div class="h-15 w-40 relative left-[25%]">
                    <p class=" text-3xl text-white font-sans">Friday</p>
                    <div class="daily-hour flex">30
                        <div class="unit">*c</div>
                    </div>
                </div>
                <div class="h-15 w-40 relative left-[25%]">
                    <p class=" text-3xl text-white font-sans">Saturday</p>
                    <div class="daily-hour flex">30
                        <div class="unit">*c</div>
                    </div>
                </div>
                <div class="h-15 w-40 relative left-[25%]">
                    <p class=" text-3xl text-white font-sans">Sunday</p>
                    <div class="daily-hour flex">30
                        <div class="unit">*c</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer>

    </footer>
    <!-- <script src="script.js"></script> -->
</body>

</html>
